<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
    <title>跳转中...  | 夏</title>
    <link rel="icon" href="https://q2.qlogo.cn/headimg_dl?dst_uin=2726730791&amp;spec=0">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #e0e0e0;
        }
        .card {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 90%;
            width: 480px;
            display: none; /* 默认隐藏，JS 决定显示还是直接跳转 */
            border: 1px solid #333;
        }
        h2 {
            margin-top: 0;
            color: #ffffff;
        }
        p {
            color: #b0b0b0;
            margin-bottom: 1.5rem;
        }
        .url-box {
            background: #2d2d2d;
            padding: 1rem;
            border-radius: 6px;
            word-break: break-all;
            margin: 1.5rem 0;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #e0e0e0;
            font-size: 0.875rem;
            border: 1px solid #333;
        }
        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: #4a90e2;
            color: white;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover {
            background: #357abd;
        }
        .btn:active {
            background: #2a689e;
        }
        .footer-links {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.875rem;
            color: #b0b0b0;
        }
        .footer-links a {
            color: #b0b0b0;
            text-decoration: none;
            margin: 0 0.5rem;
        }
        .footer-links a:hover {
            color: #4a90e2;
            text-decoration: underline;
        }
    </style>
    <script src="/js/config.js"></script>
    <script src="/js/rules_direct.js"></script>
    <script src="/js/rules_intermediate.js"></script>
    <script src="/js/redirect.js" defer></script>
</head>
<body>
    <div class="card">
        <h2>即将跳转</h2>
        <p>您即将访问外部链接，请确认：</p>
        <div id="url-display" class="url-box">加载中...</div>
        <a id="redirect-link" href="#" class="btn">继续访问</a>

        <div class="footer-links">
            <a href="https://github.com" target="_blank">GitHub</a>
            <span>|</span>
            <a href="https://399520.xyz" target="_blank">HAGo</a>
        </div>
    </div>
</body>
</html>
